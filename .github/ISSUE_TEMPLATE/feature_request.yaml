---
name: "Feature Request"
about: "Suggest a new research idea or improvement"
labels: "enhancement"

body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting an idea! Please check for duplicate requests before submitting."
  - type: textarea
    attributes:
      label: "Feature description"
      description: "Describe your goal, and if possible provide a code snippet with a motivating example."
      placeholder: "A clear and concise description of the feature..."
    validations:
      required: true
  - type: textarea
    attributes:
      label: "Motivation"
      description: "Why is this feature needed? What problem does it solve?"
      placeholder: "e.g. I'm always frustrated when..."
